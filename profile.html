<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة 4 : صفحة البيانات (عند مسح QR)</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="profile-page">

    <div class="profile-card">
        <div class="profile-header">
            <div class="logo" style="font-size: 20px;">
                <i class="fa-solid fa-shield-heart"></i>
                اطمن
            </div>
            <select class="lang-select">
                <option>عربي</option>
                <option>English</option>
            </select>
        </div>

        <div class="profile-info">
            <img src="assets/images/child.png" alt="المريض" class="profile-img">
            <h2>علي محمد أحمد</h2>
            <p>5 سنوات</p>
        </div>

        <div class="alert-danger">
            <div class="alert-title"><i class="fa-solid fa-triangle-exclamation"></i> حالة طبية مهمة</div>
            <ul class="alert-list">
                <li>حساسية من البنسلين</li>
                <li>مرض السكري (النوع الأول)</li>
            </ul>
        </div>

        <div class="info-flex">
            <div class="info-col">
                <div class="info-title">معلومات إضافية</div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span style="color: var(--text-gray);">فصيلة الدم</span>
                    <strong style="color: var(--blue);">A+</strong>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span style="color: var(--text-gray);">الوزن</span>
                    <strong style="color: var(--blue);">20 كجم</strong>
                </div>
                <div style="display: flex; justify-content: space-between;">
                    <span style="color: var(--text-gray);">الحالة العامة</span>
                    <strong style="color: var(--blue);">جيدة</strong>
                </div>
            </div>

            <div class="info-col">
                <div class="info-title">الأدوية</div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 5px; color: var(--blue);">
                        <i class="fa-solid fa-pills"></i> Insulin
                    </div>
                    <i class="fa-solid fa-circle-check" style="color: #34a853;"></i>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 5px; color: var(--blue);">
                        <i class="fa-solid fa-pills"></i> Panadol
                    </div>
                    <span></span>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div style="display: flex; align-items: center; gap: 5px; color: var(--blue);">
                        <i class="fa-solid fa-pills"></i> Vitamin D
                    </div>
                    <i class="fa-solid fa-circle-check" style="color: #34a853;"></i>
                </div>
            </div>
        </div>

        <div class="info-box" style="margin-top: 20px;">
            <div class="info-title">أرقام الطوارئ</div>
            <div class="emergency-list">
                <div class="emergency-item">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img src="https://placehold.co/40x40/f0f0f0/999?text=Dad" alt="الأب" style="border-radius: 50%;">
                        <div class="emer-text">
                            <strong>محمد أحمد الأب</strong>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span style="color: var(--blue); font-weight: 600; font-size: 13px;">0100 123 4567</span>
                        <a href="tel:01001234567" class="emer-btn"><i class="fa-solid fa-phone"></i></a>
                    </div>
                </div>
                <div class="emergency-item">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <img src="https://placehold.co/40x40/f0f0f0/999?text=Mom" alt="الأم" style="border-radius: 50%;">
                        <div class="emer-text">
                            <strong>أسماء محمد الأم</strong>
                        </div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span style="color: var(--blue); font-weight: 600; font-size: 13px;">0100 987 6543</span>
                        <a href="tel:01009876543" class="emer-btn"><i class="fa-solid fa-phone"></i></a>
                    </div>
                </div>
            </div>
        </div>

        <button class="btn btn-primary" style="width: 100%; border-radius: 8px; margin-bottom: 15px;">إرسال موقعي <i class="fa-solid fa-location-dot"></i></button>

        <div style="text-align: center; font-size: 11px; color: var(--text-gray);">
            <i class="fa-solid fa-shield-heart" style="color: var(--blue);"></i> تم إنشاء هذه الصفحة بواسطة اطمن
        </div>

    </div>

</body>
</html>
