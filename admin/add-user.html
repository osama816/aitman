<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مستخدم جديد | اطمن</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; display: flex; min-height: 100vh; margin: 0; }
        
        /* Sidebar (Same as dashboard) */
        .sidebar { width: 260px; background-color: var(--primary-navy); color: #fff; display: flex; flex-direction: column; position: fixed; right: 0; height: 100vh; }
        .sidebar-logo { padding: 30px 20px; font-size: 24px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; text-align: center; }
        .sidebar-logo i { color: var(--bright-blue); margin-left: 10px; }
        .nav-menu { list-style: none; padding: 0; margin: 0; flex-grow: 1; }
        .nav-item { margin-bottom: 5px; }
        .nav-link { display: flex; align-items: center; padding: 15px 25px; color: #94a3b8; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.05); color: #fff; border-right: 4px solid var(--bright-blue); }
        .nav-link i { width: 25px; font-size: 18px; margin-left: 10px; }
        
        /* Main Content */
        .main-content { margin-right: 260px; flex-grow: 1; padding: 40px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .header h1 { font-size: 24px; color: var(--primary-navy); }
        
        /* Form Card */
        .form-card { background: #fff; border-radius: 16px; box-shadow: var(--shadow-sm); padding: 30px; max-width: 800px; }
        .form-section-title { font-size: 1.2rem; color: var(--primary-navy); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
        
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-dark); font-weight: 600; }
        .form-control { width: 100%; padding: 12px 15px; border: 1px solid var(--border-color); border-radius: 8px; font-family: 'Tajawal', sans-serif; font-size: 1rem; transition: 0.3s; }
        .form-control:focus { outline: none; border-color: var(--bright-blue); box-shadow: 0 0 0 3px rgba(24, 80, 209, 0.1); }
        textarea.form-control { resize: vertical; min-height: 100px; }
        
        .image-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed var(--border-color); border-radius: 12px; padding: 30px; cursor: pointer; color: var(--text-gray); transition: 0.3s; }
        .image-upload:hover { border-color: var(--bright-blue); color: var(--bright-blue); }
        .image-upload i { font-size: 32px; margin-bottom: 10px; }
        
        .btn-submit { background: var(--bright-blue); color: #fff; padding: 15px 30px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn-submit:hover { background: #123fa8; }
        
        /* Responsive Admin */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: static; width: 100%; height: auto; padding: 0; border-bottom: 1px solid var(--border-color); }
            .sidebar-logo { display: none; }
            .nav-menu { display: flex; overflow-x: auto; white-space: nowrap; }
            .nav-item { margin: 0; }
            .nav-link { padding: 15px; border-right: none !important; border-bottom: 3px solid transparent; }
            .nav-link.active { background: transparent; color: var(--bright-blue); border-bottom-color: var(--bright-blue); }
            .main-content { margin-right: 0; padding: 20px; }
            .form-row { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; gap: 15px; }
        }
    </style>
</head>
<body>
    
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-shield-heart"></i> اطمن
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="dashboard.html" class="nav-link"><i class="fa-solid fa-house"></i> لوحة التحكم</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-users"></i> المستخدمون</a></li>
            <li class="nav-item"><a href="add-user.html" class="nav-link active"><i class="fa-solid fa-user-plus"></i> إضافة مستخدم</a></li>
            <li class="nav-item"><a href="#" class="nav-link"><i class="fa-solid fa-ring"></i> الأساور</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <h1>إضافة مستخدم جديد</h1>
        </div>

        <div class="form-card">
            <form action="#">
                <!-- Basic Info -->
                <h2 class="form-section-title">المعلومات الأساسية</h2>
                <div class="form-row">
                    <div class="image-upload">
                        <i class="fa-solid fa-camera"></i>
                        <span>رفع صورة</span>
                    </div>
                    <div>
                        <div class="form-group">
                            <label>الاسم الكامل</label>
                            <input type="text" class="form-control" placeholder="اكتب الاسم الكامل بالكامل">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>العمر</label>
                                <input type="text" class="form-control" placeholder="اكتب العمر">
                            </div>
                            <div class="form-group">
                                <label>فصيلة الدم</label>
                                <select class="form-control">
                                    <option>اختر فصيلة الدم</option>
                                    <option>A+</option><option>O+</option><option>B+</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Medical Info -->
                <h2 class="form-section-title">المعلومات الطبية</h2>
                <div class="form-group">
                    <label>الحالة الطبية (مهم جداً)</label>
                    <input type="text" class="form-control" placeholder="مثل: سكري، حساسية بنسلين">
                </div>
                <div class="form-group">
                    <label>معلومات إضافية / أدوية</label>
                    <textarea class="form-control" placeholder="أي معلومات إضافية مهمة"></textarea>
                </div>

                <!-- Emergency Contacts -->
                <h2 class="form-section-title">أرقام الطوارئ</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>رقم هاتف 1 (الأب/الأم)</label>
                        <input type="tel" class="form-control" placeholder="01xxxxxxxxx">
                    </div>
                    <div class="form-group">
                        <label>رقم هاتف 2 (اختياري)</label>
                        <input type="tel" class="form-control" placeholder="01xxxxxxxxx">
                    </div>
                </div>

                <button type="submit" class="btn-submit">حفظ وإصدار QR Code</button>
            </form>
        </div>
    </div>

</body>
</html>
