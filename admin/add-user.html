<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة مستخدم جديد - لوحة التحكم</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="admin-layout">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-shield-heart"></i>
                اطمن
            </div>
            <div class="nav-menu">
                <a href="dashboard.html" class="nav-link">
                    <i class="fa-solid fa-house"></i> لوحة التحكم
                </a>
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-users"></i> المستخدمون
                </a>
                <a href="add-user.html" class="nav-link active">
                    <i class="fa-solid fa-user-plus"></i> إضافة مستخدم
                </a>
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-ring"></i> الأساور
                </a>
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-box"></i> الطلبات
                </a>
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-chart-pie"></i> التقارير
                </a>
                <a href="#" class="nav-link">
                    <i class="fa-solid fa-gear"></i> الإعدادات
                </a>
                <div style="margin-top: 50px;">
                    <a href="#" class="nav-link">
                        <i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج
                    </a>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            
            <div class="form-card">
                <h2 class="form-title">إضافة مستخدم جديد</h2>
                
                <form action="#">
                    <!-- Basic Info -->
                    <div style="font-weight: 700; margin-bottom: 15px; color: var(--navy);">المعلومات الأساسية</div>
                    
                    <div class="form-grid">
                        <!-- Upload Image (Left side in LTR, Right side in RTL, but in mockup it's on the left, so order should be right content then left content) -->
                        <div>
                            <div class="form-group">
                                <label>الاسم الكامل</label>
                                <input type="text" class="form-control" placeholder="اكتب الاسم بالكامل">
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>العمر</label>
                                    <input type="text" class="form-control" placeholder="اكتب العمر">
                                </div>
                                <div class="form-group">
                                    <label>فصيلة الدم</label>
                                    <select class="form-control">
                                        <option>اختر فصيلة الدم</option>
                                        <option>A+</option><option>O+</option><option>B+</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="upload-box">
                            <i class="fa-solid fa-camera"></i>
                            <span style="font-size: 13px; font-weight: bold; margin-top: 5px;">رفع صورة</span>
                        </div>
                    </div>

                    <!-- Medical Info -->
                    <div style="font-weight: 700; margin: 30px 0 15px; color: var(--navy);">المعلومات الطبية</div>
                    <div class="form-group">
                        <label><span style="color: red;">*</span> الحالة الطبية</label>
                        <input type="text" class="form-control" placeholder="اكتب الحالة الطبية">
                    </div>
                    <div class="form-group">
                        <label>معلومات إضافية</label>
                        <textarea class="form-control" placeholder="أي معلومات إضافية مهمة"></textarea>
                    </div>

                    <!-- Emergency Contacts -->
                    <div style="font-weight: 700; margin: 30px 0 15px; color: var(--navy);">أرقام الطوارئ</div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>رقم هاتف 1</label>
                            <input type="text" class="form-control" placeholder="اكتب الرقم">
                        </div>
                        <div class="form-group">
                            <label>رقم هاتف 2</label>
                            <input type="text" class="form-control" placeholder="01xxxxxxxxx">
                        </div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <a href="#" style="color: var(--blue); font-size: 13px; font-weight: bold;"><i class="fa-solid fa-plus"></i> إضافة رقم آخر</a>
                    </div>

                    <div style="display: flex; gap: 15px;">
                        <button type="submit" class="btn btn-primary" style="flex: 1; border-radius: 8px;">حفظ وإصدار QR</button>
                        <button type="button" class="btn btn-outline" style="flex: 1; border-radius: 8px;">إلغاء <i class="fa-solid fa-rotate-left"></i></button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</body>
</html>
